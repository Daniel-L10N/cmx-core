name: CMX-CORE Test Suite

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y jq sqlite3 python3 bash

      - name: Initialize SQLite database
        run: |
          bash scripts/cmx-memories-init.sh cmx-core || true

      - name: Syntax check all scripts
        run: |
          echo "=== Syntax Check ==="
          FAILURES=0
          for script in cmx brain.sh run.sh \
            scripts/*.sh \
            orchestrator/*.sh \
            agents/*.sh \
            lib/*.sh; do
            if [ -f "$script" ]; then
              if bash -n "$script" 2>/dev/null; then
                echo "  ✓ $script"
              else
                echo "  ✗ $script"
                FAILURES=$((FAILURES + 1))
              fi
            fi
          done
          if [ $FAILURES -gt 0 ]; then
            echo "FAIL: $FAILURES scripts with syntax errors"
            exit 1
          fi
          echo "All scripts pass syntax check"

      - name: Run test suite
        run: |
          bash tests/test-security.sh

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            logs/
            tests/
          retention-days: 30

  lint:
    name: ShellCheck Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on core scripts
        run: |
          echo "=== ShellCheck ==="
          FAILURES=0
          for script in cmx brain.sh run.sh \
            scripts/memory-save.sh \
            scripts/memory-query.sh \
            scripts/cleanup-project.sh \
            lib/logger.sh \
            lib/metrics.sh \
            lib/state-lock.sh \
            lib/agent-ai.sh \
            lib/context-cache.sh \
            lib/plugins.sh; do
            if [ -f "$script" ]; then
              if shellcheck -x -s bash "$script" 2>/dev/null; then
                echo "  ✓ $script"
              else
                echo "  ⚠ $script (warnings)"
              fi
            fi
          done
        continue-on-error: true

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pytest

      - name: Run Python tests
        run: |
          if [ -f "tests/test_ai_selector.py" ]; then
            python -m pytest tests/test_ai_selector.py -v
          else
            echo "No Python tests found (skipping)"
          fi
        continue-on-error: true
